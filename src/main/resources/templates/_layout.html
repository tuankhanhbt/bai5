<!DOCTYPE html>
<html lang="en"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"

            padding-top: 20px;

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-body" data-bs-theme="dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/products}">Home</a>
        <a class="navbar-brand" th:href="@{/products}">Products</a>
        <a class="navbar-brand" th:href="@{/categories}">Categories</a>
    </div>
</nav>

<div layout:fragment="content" class="container body-content"></div>

<footer class="text-center">
    <p>&copy; 2025 - Phát triển ứng dụng với J2EE</p>
</footer>
