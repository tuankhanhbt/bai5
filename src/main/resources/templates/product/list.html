<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Product List</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        .body-content {
            min-height: 500px;
            padding-top: 20px;
            padding-bottom: 20px;
        }

        .product-image {
            width: 150px;
            height: 120px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid #ddd;
        }

        footer {
            margin-top: 30px;
            padding: 20px 0;
            border-top: 1px solid #ddd;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-body" data-bs-theme="dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/products}">Home</a>
        <a class="navbar-brand" th:href="@{/products}">Products</a>
        <a class="navbar-brand" th:href="@{/categories}">Categories</a>
    </div>
</nav>

<div class="container body-content">
    <div class="mb-3">
        <a th:href="@{/products/add}" class="btn btn-primary">Create New Product</a>
        <a th:href="@{/categories/add}" class="btn btn-success">Create New Category</a>
    </div>

    <table class="table table-striped table-bordered align-middle">
        <thead>
        <tr>
            <th scope="col">#</th>
            <th scope="col">Name</th>
            <th scope="col">Image</th>
            <th scope="col">Price</th>
            <th scope="col">Category Name</th>
            <th scope="col" width="160">Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="product : ${products}">
            <th scope="row" th:text="${product.id}"></th>
            <td th:text="${product.name}"></td>
            <td>
                <img th:if="${product.image != null and !#strings.isEmpty(product.image)}"
                     th:src="${product.image}"
                     alt="Product Image"
                     class="product-image">
                <span th:if="${product.image == null or #strings.isEmpty(product.image)}">No image</span>
            </td>
            <td th:text="${product.price}"></td>
            <td th:text="${product.category != null ? product.category.name : ''}"></td>
            <td>
                <a th:href="@{/products/edit/{id}(id=${product.id})}"
                   class="btn btn-secondary btn-sm">Edit</a>
                <a th:href="@{/products/delete/{id}(id=${product.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Bạn có chắc muốn xóa sản phẩm này?')">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<footer class="text-center">
    <p>&copy; 2025 - Phát triển ứng dụng với J2EE</p>
</footer>

</body>
</html>
